name: "Test Workflow"
on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]

jobs:
    test:
        runs-on: ubuntu-latest
        container: quay.io/cellgeni/reprocess_10x:1.1
        strategy:
            matrix:
                include:
                    - technology: 10x
                    - technology: dropseq
                    - technology: indrops
                    - technology: smartseq
                    - technology: rhapsody
                    - technology: strt
        name: "Run tests for ${{ matrix.technology }}"

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            
            - name: Unpack test data
              run: |
                pwd
                ls -la data/
                tar -xzf data/test.tar.gz -C .
                echo "Extracted files:"
                ls -la data/test/ || echo "data/test/ not found"
                ls -la data/test/whitelists/ || echo "whitelists not found"
            
            - name: Run tests
              run: |
                set -e
                technology=${{ matrix.technology }}
                bin/starsolo $technology data/test/fastqs/${technology} "$technology" --ref data/test/reference/index --whitelist-dir data/test/whitelists --no-bam --cpus 1
    

