# =============================================================================
# STARsolo CLI - Default Configuration
# =============================================================================
# This file is sourced by all starsolo subcommands.
# Override any value via CLI flags or by editing this file.
#
# Environment variables with the STARSOLO_ prefix will override these defaults
# (e.g. export STARSOLO_CPUS=8).
# =============================================================================

# --- Compute resources ---
STARSOLO_CPUS="${STARSOLO_CPUS:-16}"

# --- Reference genome base directory ---
# Platform scripts resolve the full path as: $STARSOLO_REF_BASE/<species>/2020A/index
STARSOLO_REF_BASE="${STARSOLO_REF_BASE:-/nfs/cellgeni/STAR}"

# --- Barcode whitelist directory ---
STARSOLO_WL_DIR="${STARSOLO_WL_DIR:-/nfs/cellgeni/STAR/whitelists}"

# --- BAM output (default: no BAM) ---
# Set to "bam" to produce a sorted BAM by default.
STARSOLO_BAM_MODE="${STARSOLO_BAM_MODE:-nobam}"

# --- Adapter reference for bbduk ---
STARSOLO_BBDUK_ADAPTERS="${STARSOLO_BBDUK_ADAPTERS:-/software/cellgen/cellgeni/bbmap/resources/adapters.fa}"
